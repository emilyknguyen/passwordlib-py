schema_version = "1.1"

[task]
name = "utility-libraries/passwordlib-py"
description = """
Implement a Password History tracking system for the Password Library.

The system must:
- Track per-user password history with a configurable maximum size (FIFO eviction)
- Detect exact password reuse by hashing and comparing against stored history
- Support pluggable storage backends via an abstract interface
- Validate all inputs (user IDs, passwords) before touching storage
- Wrap backend failures in a domain-specific error type with cause chaining
- Handle concurrent reads and writes without data corruption or duplicate entries
- Detect similar passwords (case variants, trailing digits/spaces, leet-speak) without storing plaintext
- Verify passwords hashed with different algorithms by reading algorithm/salt/iterations from stored dumps
"""
authors = [{name = "emilyknguyen", email = "emilyknguyen@meta.com"}]
keywords = ["password", "history", "tracking", "security", "hashing"]

