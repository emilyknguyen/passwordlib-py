[task]
name = "Password History Tracking"
description = """
Add password history tracking to passwordlib so that applications can prevent
users from reusing recent or similar passwords.  The module lives under
src/passwordlib/tracked_passwords/ and provides a PasswordHistory class with
pluggable storage, thread-safe operation, input validation, error handling,
similarity detection, and algorithm-agnostic verification.
"""

[task.requirements]
summary = "Track per-user password history and detect reuse / similarity"
details = [
    "Pluggable storage backends — HistoryBackend ABC + default InMemoryBackend",
    "Input validation — reject None, empty, whitespace-only, and wrong-type passwords/user_ids",
    "Error handling — wrap backend/hashing failures in PasswordHistoryError with chained cause",
    "Thread safety — concurrent reads/writes must not corrupt state or create duplicate entries",
    "Similarity detection — detect case changes, trailing digits/spaces, leet-speak without storing plaintext",
    "Algorithm-agnostic verification — verify candidates against the algorithm embedded in each stored hash",
    "Fixed-size per-user history with oldest-first eviction",
    "clear_history and get_history_size utility methods",
    "Accept both str and bytes passwords consistent with the rest of the library",
]

[task.files]
source_dir = "src/passwordlib/tracked_passwords/"
tracker = "src/passwordlib/tracked_passwords/tracker.py"
backends = "src/passwordlib/tracked_passwords/backends.py"
similarity = "src/passwordlib/tracked_passwords/similarity.py"
init = "src/passwordlib/tracked_passwords/__init__.py"
tests = "tests/test_tracked_passwords.py"

[task.tests]
framework = "unittest"
command = "python -m pytest tests/test_tracked_passwords.py -v"
groups = [
    "TestPasswordReuse          — basic add / check / eviction / clear",
    "TestInputValidation        — None, empty, whitespace, wrong type",
    "TestPluggableBackend       — custom backend integration",
    "TestErrorHandling          — backend failures → PasswordHistoryError",
    "TestConcurrency            — parallel adds, parallel add+check, duplicate prevention",
    "TestSimilarityDetection    — case, trailing digits/spaces, leet-speak, disabled raises",
    "TestAlgorithmRehashing     — cross-algorithm verification",
    "TestRegressions            — guards against previously caught bugs",
]
